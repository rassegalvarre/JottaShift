# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh  # PowerShell Core

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/JottaShift.slnx
    - name: Build
      run: dotnet build src/JottaShift.slnx --no-restore
    - name: Test
      run: | 
          dotnet test src/JottaShift.Tests/JottaShift.Tests.csproj `
          --no-build `
          --verbosity normal `
          --filter "(Dependency!=Google.Api)&(Dependency!=Jottacloud.Api)&(Dependency!=Env)"
